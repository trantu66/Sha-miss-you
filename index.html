<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sha có điều muốn nói</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #d63384;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #startBtn:hover {
            transform: scale(1.1);
            background-color: #ff1493;
        }

        /* Style cho cửa sổ mini giả */
        .popup {
            position: absolute;
            width: 250px;
            padding: 20px;
            background: white;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }

        .popup-header {
            font-weight: bold;
            color: #ff1493;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .popup-content {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.5;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Sha có điều muốn nói</h1>
    <button id="startBtn">Click vào để xem</button>

    <script>
        const btn = document.getElementById('startBtn');
        let count = 0;
        const maxPopups = 50; // Giới hạn số lượng để tránh treo máy

        btn.addEventListener('click', () => {
            // Hiệu ứng bắt đầu xuất hiện liên tục
            const interval = setInterval(() => {
                createPopup();
                count++;
                if (count >= maxPopups) {
                    clearInterval(interval);
                }
            }, 200); // Cứ 0.2 giây hiện 1 cái
        });

        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'popup';
            
            // Vị trí ngẫu nhiên trên màn hìnhconst x = Math.random() * (window.innerWidth - 250);
            const y = Math.random() * (window.innerHeight - 150);
            
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            popup.innerHTML = `
                <div class="popup-header">
                    <span>Thông báo!</span>
                    <span style="cursor:pointer">×</span>
                </div>
                <div class="popup-content">
                    Tràn ngập bộ nhớ nhớ nhớ em! ❤️
                </div>
            `;

            document.body.appendChild(popup);
        }
    </script>
</body>
</html>
