<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sha có điều muốn nói</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ffe4e1; font-family: sans-serif; overflow: hidden; }
        h1 { color: #d63384; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #ff69b4; color: white; border: none; border-radius: 50px; cursor: pointer; z-index: 9999; position: relative; }
        .popup { position: absolute; width: 200px; padding: 15px; background: white; border: 2px solid #ff69b4; border-radius: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); z-index: 100; text-align: center; pointer-events: none; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>
    <h1>Sha có điều muốn nói</h1>
    <button onclick="startHeart()">Click vào để xem</button>

    <script>
        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'popup';
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 100);
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.innerHTML = "Tràn ngập bộ nhớ nhớ nhớ em! ❤️";
            document.body.appendChild(popup);
        }

        function startHeart() {
            let count = 0;
            const timer = setInterval(() => {
                createPopup();
                count++;
                if (count > 50) clearInterval(timer);
            }, 150);
        }
    </script>
</body>
</html>
