<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sha có điều muốn nói</title>
    <style>
        /* 1. CHỈNH NỀN TOÀN TRANG (MÀU TRẮNG) */
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #ffffff; /* Màu trắng #ffffff */
            font-family: sans-serif; 
            overflow: hidden; 
        }

        /* 2. CHỈNH CHỮ TIÊU ĐỀ (MÀU ĐEN) */
        h1 { 
            color: #000000; /* Màu đen #000000 */
            font-size: 3rem; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* Giảm độ bóng */
        }

        /* Nút bấm (mình giữ nguyên màu hồng để tạo điểm nhấn, nếu muốn đen trắng bạn báo mình) */
        #btn { 
            padding: 15px 40px; 
            font-size: 1.5rem; 
            background: #ffc0cb; 
            color: #000000; /* Chữ trên nút màu đen */
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 3. CHỈNH POPUP (NỀN TRẮNG, CHỮ ĐEN, VIỀN ĐEN) */
        .box { 
            position: absolute; 
            width: 180px; 
            padding: 15px; 
            background: #ffffff; /* Nền trắng */
            border: 2px solid #000000; /* Viền đen */
            border-radius: 15px; 
            color: #000000; /* Chữ trong popup màu đen */
            font-weight: bold; 
            text-align: center; 
            z-index: 100; 
            animation: appear 0.2s ease-out; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        @keyframes appear { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>Sha có điều muốn nói</h1>
    <button id="btn">Click vào để xem</button>

    <script>
        const button = document.getElementById('btn');
        
        button.onclick = function() {
            let count = 0;
            // Xóa hết popup cũ nếu có (tránh bị rối nếu bấm nhiều lần)
            document.querySelectorAll('.box').forEach(el => el.remove());

            const interval = setInterval(() => {
                const div = document.createElement('div');
                div.className = 'box';
                div.innerHTML = "Tràn ngập bộ nhớ nhớ nhớ em! ❤️";
                
                // Vị trí ngẫu nhiên
                div.style.left = Math.random() * (window.innerWidth - 180) + 'px';
                div.style.top = Math.random() * (window.innerHeight - 80) + 'px';
                
                document.body.appendChild(div);
                count++;
                
                if (count > 60) clearInterval(interval);}, 100);
        };
    </script>
</body>
</html>
